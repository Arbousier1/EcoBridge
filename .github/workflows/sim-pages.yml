name: Economic Simulation & GitHub Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - 'sim_long_run.py'
      - 'ecobridge-rust/src/economy/**'
      - 'ecobridge-java/src/main/java/**/control/**'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # every Monday 06:00 UTC

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  simulate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install matplotlib pillow numpy

      - name: Run 365-day simulation
        run: python sim_long_run.py

      - name: Generate charts
        run: python sim_chart.py

      - name: Copy to pages
        run: |
          mkdir -p _site
          cp sim_output/*.png _site/
          cp sim_output/*.svg _site/ 2>/dev/null || true

          # Build index page
          cat > _site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="zh">
          <head>
          <meta charset="UTF-8">
          <title>EcoBridge 经济模拟报告</title>
          <style>
            body { background:#0d1117; color:#c9d1d9; font:14px/1.6 system-ui,sans-serif; max-width:1100px; margin:40px auto; padding:0 20px; }
            h1 { font-size:1.6em; }
            h2 { font-size:1.1em; color:#8b949e; margin-top:2em; }
            a { color:#58a6ff; }
            .chart { max-width:100%; border:1px solid #30363d; border-radius:8px; margin:1em 0; }
            .footer { color:#484f58; font-size:12px; margin-top:3em; border-top:1px solid #21262d; padding-top:1em; }
          </style>
          </head>
          <body>
          <h1>EcoBridge 365-Day Economic Simulation</h1>
          <p>Minecraft 服务器经济模型 365 天推演。基于 GARCH(1,1) + Kalman + FuzzyPID + MPC。</p>
          <p>Last updated: <time>$(date -u +"%Y-%m-%d %H:%M UTC")</time></p>

          <h2>Money Supply (M1)</h2>
          <img class="chart" src="money_curve.png" alt="M1 Money Supply">

          <h2>Macro Overview & Prices</h2>
          <img class="chart" src="ecobridge_macro_and_prices.png" alt="Macro Indicators and Prices">

          <h2>Event Impact & Analysis</h2>
          <img class="chart" src="ecobridge_analysis.png" alt="Event Impact and Correlation">

          <div class="footer">
            Generated by <a href="https://github.com/Arbousier1/EcoBridge">EcoBridge</a> —
            <a href="sim_daily.csv">Download raw CSV data</a>
          </div>
          </body>
          </html>
          HTML

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
